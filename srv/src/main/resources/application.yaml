---
spring:
  config.activate.on-profile: default
  sql.init.platform: h2
cds:
  datasource:
    auto-config.enabled: false
  security:
    mock:
      users:
        - name: admin
          password: admin123
          roles:
            - InventoryAdmin
        - name: viewer
          password: viewer123
          roles:
            - InventoryViewer
---
management:
  endpoint:
    health:
      show-components: always
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health
  health:
    defaults:
      enabled: false
    ping:
      enabled: true
    db:
      enabled: true
